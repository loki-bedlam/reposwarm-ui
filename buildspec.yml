version: 0.2
env:
  variables:
    AWS_DEFAULT_REGION: us-east-1
    AWS_ACCOUNT_ID: "194908539076"
    ECR_REPO: 194908539076.dkr.ecr.us-east-1.amazonaws.com/reposwarm-ui
    CLUSTER: reposwarm-cluster
    SERVICE: reposwarm-ui
phases:
  install:
    runtime-versions:
      nodejs: 24
  pre_build:
    commands:
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
  build:
    commands:
      - echo "=== Type checking ==="
      - cd $CODEBUILD_SRC_DIR && npm ci
      - cd $CODEBUILD_SRC_DIR && npx tsc --noEmit
      - echo "=== Running tests ==="
      - cd $CODEBUILD_SRC_DIR && npx vitest run
      - echo "=== Building Docker image (build $CODEBUILD_BUILD_NUMBER) ==="
      - cd $CODEBUILD_SRC_DIR && docker build --build-arg BUILD_NUMBER=$CODEBUILD_BUILD_NUMBER -t $ECR_REPO:latest -t $ECR_REPO:$IMAGE_TAG -t $ECR_REPO:build-$CODEBUILD_BUILD_NUMBER .
      - docker push $ECR_REPO:latest
      - docker push $ECR_REPO:$IMAGE_TAG
      - docker push $ECR_REPO:build-$CODEBUILD_BUILD_NUMBER
  post_build:
    commands:
      - echo "=== Deploying to ECS ==="
      - aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --region $AWS_DEFAULT_REGION
      - echo "Build complete — image $ECR_REPO:$IMAGE_TAG"
